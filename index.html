<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap"
      rel="stylesheet"
    />
    <title>Nitesh Patel</title>
    <script>
      // Disable browser scroll restoration
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }
      
      // Force immediate scroll to top before any React code runs
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
      
      // Ensure scroll to top on page visibility change (handles tab switching)
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
          window.scrollTo(0, 0);
        }
      });
      
      // Ensure scroll to top before page unload
      window.addEventListener('beforeunload', function() {
        window.scrollTo(0, 0);
      });
      
      // Additional scroll to top on page show (handles back/forward navigation)
      window.addEventListener('pageshow', function() {
        window.scrollTo(0, 0);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
